<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Мой Зал">
  <title>Мой Зал — дневник тренировок</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <main id="app">
    <!-- Тренировка -->
    <section class="page active" id="page-workout"></section>
    <!-- Программы -->
    <section class="page" id="page-programs"></section>
    <!-- История -->
    <section class="page" id="page-history"></section>
    <!-- Прогресс -->
    <section class="page" id="page-progress"></section>
    <!-- Ещё: упражнения, калькуляторы, база знаний, настройки -->
    <section class="page" id="page-more"></section>
  </main>

  <!-- Баннер таймера отдыха -->
  <div id="rest-timer" class="rest-timer hidden">
    <div class="rest-timer-info">
      <span class="rest-timer-label">Отдых</span>
      <span class="rest-timer-time" id="rest-time">1:30</span>
    </div>
    <div class="rest-timer-actions">
      <button class="btn-chip" id="rest-plus">+15 c</button>
      <button class="btn-chip" id="rest-skip">Пропустить</button>
    </div>
  </div>

  <!-- Нижнее меню -->
  <nav class="tabbar">
    <button class="tab active" data-page="workout">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5h2v11h-2zm9 0h2v11h-2zM3 9h2v6H3zm16 0h2v6h-2zM8.5 11h7v2h-7z"/></svg>
      <span>Тренировка</span>
    </button>
    <button class="tab" data-page="programs">
      <svg viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 2v14h10V5H7zm2 3h6v2H9V8zm0 4h6v2H9v-2zm0 4h4v2H9v-2z"/></svg>
      <span>Программы</span>
    </button>
    <button class="tab" data-page="history">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm1-13h-2v6l5.2 3.1 1-1.6-4.2-2.5z"/></svg>
      <span>История</span>
    </button>
    <button class="tab" data-page="progress">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 7.9 20.6 6.5 13.5 13.6l-4-4-7.5 7.5z"/></svg>
      <span>Прогресс</span>
    </button>
    <button class="tab" data-page="more">
      <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      <span>Ещё</span>
    </button>
  </nav>

  <!-- Модальные окна -->
  <div id="modal-root"></div>

  <script src="./js/data.js"></script>
  <script src="./js/recipes.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
